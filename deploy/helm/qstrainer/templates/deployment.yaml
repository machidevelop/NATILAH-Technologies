apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qstrainer.fullname" . }}
  labels:
    {{- include "qstrainer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qstrainer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qstrainer.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "qstrainer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - agent
            - --config
            - /etc/qstrainer/config.yaml
          env:
            - name: QSTRAINER_AGENT__MODE
              value: {{ .Values.config.mode | quote }}
            - name: QSTRAINER_AGENT__FLEET_SIZE
              value: {{ .Values.config.fleetSize | quote }}
            - name: QSTRAINER_PIPELINE__EMIT_THRESHOLD
              value: {{ .Values.config.emitThreshold | quote }}
            - name: QSTRAINER_CHECKPOINT__DIR
              value: /var/lib/qstrainer/checkpoints
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- if .Values.metrics.enabled }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/qstrainer
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/qstrainer
            {{- end }}
            - name: tmp
              mountPath: /tmp
          {{- if .Values.gpu.enabled }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
            limits:
              nvidia.com/gpu: {{ .Values.gpu.count }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "qstrainer.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "qstrainer.fullname" . }}-data
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
