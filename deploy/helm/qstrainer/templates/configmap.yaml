apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qstrainer.fullname" . }}-config
  labels:
    {{- include "qstrainer.labels" . | nindent 4 }}
data:
  config.yaml: |
    agent:
      mode: {{ .Values.config.mode }}
      fleet_size: {{ .Values.config.fleetSize }}
      poll_interval_ms: 100
    pipeline:
      emit_threshold: {{ .Values.config.emitThreshold }}
      heartbeat_interval: {{ .Values.config.heartbeatInterval }}
    checkpoint:
      enabled: {{ .Values.config.checkpoint.enabled }}
      interval_sec: {{ .Values.config.checkpoint.intervalSec }}
      dir: /var/lib/qstrainer/checkpoints
      max_checkpoints: {{ .Values.config.checkpoint.maxCheckpoints }}
    emitters:
      prometheus:
        enabled: true
        port: {{ .Values.metrics.port }}
